volumes:
  mysql-data:
  redis-data:
  kafka-data:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:

x-base-service: &base-service
  restart: unless-stopped
  env_file:
    - .env
  depends_on:
    - discovery-server

services:
  discovery-server:
    <<: *base-service
    image: arivanamin/cinemayan-discovery-server:latest
    container_name: discovery-server
    ports:
      - "8761:8761"
    labels:
      logging: "promtail"
      com.docker.compose.service: "discovery-server"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on: [ ]

  api-gateway:
    <<: *base-service
    image: arivanamin/cinemayan-api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    labels:
      logging: "promtail"
      com.docker.compose.service: "api-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis

  promtail:
    image: grafana/promtail:3.6.9
    container_name: promtail
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/config.yaml
    volumes:
      - ./Docker/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
  
  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./Docker/loki/loki-config.yaml:/etc/loki/config.yaml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tempo:
    image: grafana/tempo:2.9.1
    container_name: tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./Docker/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
  
  otel:
    image: otel/opentelemetry-collector:0.150.1
    container_name: otel
    restart: unless-stopped
    command:
      - --config=/etc/otel-collector-config.yaml
    volumes:
      - ./Docker/otel/otel-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4318:4318"
    depends_on:
      - tempo


  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    restart: unless-stopped
    command:
      - --enable-feature=exemplar-storage
      - --config.file=/etc/prometheus/prometheus.yaml
    volumes:
      - ./Docker/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    restart: unless-stopped
    volumes:
      - ./Docker/grafana:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3000:3000"
    depends_on:
      - loki

  mysql:
    image: mysql:9.7.0
    container_name: mysql
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
      - ./Docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2.3
    container_name: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: mysql
    ports:
      - "9797:80"
    depends_on:
      - mysql

  redis:
    image: redis:8.4.2
    container_name: redis-server
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    restart: unless-stopped
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
  
  
