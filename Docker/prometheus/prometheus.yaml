global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'prometheus:9090' ]

  - job_name: 'otel-collector'
    static_configs:
      - targets: [ 'otel:8889' ]
        labels:
          instance: 'otel-collector'

  - job_name: 'api-gateway-service'
    metrics_path: '/actuator/api-gateway/prometheus'
    static_configs:
      - targets: [ 'api-gateway:8080' ]
        labels:
          instance: 'Api-Gateway'
          application: 'Api-Gateway'

  - job_name: 'catalog-service'
    metrics_path: '/actuator/catalog/prometheus'
    static_configs:
      - targets: [ 'api-gateway:8080' ]
        labels:
          instance: 'Catalog-Service'
          application: 'Catalog-Service'
